name: Horror Video Pipeline

on:
  workflow_dispatch:
    inputs:
      reddit_url:
        description: 'URL Reddit'
        required: true
      audio_url:
        description: 'URL WAV'
        required: true

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip bc
          pip3 install stable-ts Pillow --break-system-packages
          npm install -g puppeteer-cli

      - name: Download audio
        run: wget -O narration.wav "${{ github.event.inputs.audio_url }}"

      - name: Generate SRT subtitles
        run: stable-ts narration.wav --output subs.srt

      - name: Generate Reddit HTML
        run: |
          python3 -c "
          import json
          d = json.load(open('post.json'))
          title = d['title'].replace('<','&lt;').replace('>','&gt;')
          text = d['text'][:5000].replace('<','&lt;').replace('>','&gt;').replace('\n','<br>')
          author = d['author']
          score = d['score']
          html = '''<!DOCTYPE html>
          <html><head><meta charset=\"UTF-8\">
          <style>
          body { background: #1a1a1b; color: #d7dadc; font-family: sans-serif; margin: 0; padding: 20px; width: 1080px; }
          .post { background: #272729; border-radius: 8px; padding: 24px; }
          .sub { color: #ff4500; font-weight: 700; font-size: 14px; }
          .author { color: #818384; font-size: 13px; margin: 8px 0; }
          .title { font-size: 22px; font-weight: 700; margin: 16px 0; line-height: 1.4; }
          .text { font-size: 16px; line-height: 1.8; margin-top: 16px; }
          </style></head>
          <body><div class=\"post\">
          <div class=\"sub\">r/nosleep</div>
          <div class=\"author\">u/''' + author + ''' • ▲ ''' + str(score) + '''</div>
          <div class=\"title\">''' + title + '''</div>
          <hr style=\"border-color:#343536\">
          <div class=\"text\">''' + text + '''</div>
          </div></body></html>'''
          open('thread.html','w').write(html)
          print('HTML generated')
          "

      - name: Screenshot HTML
        run: puppeteer screenshot "file://$(pwd)/thread.html" screenshot.png --full-page --viewport "1080x1920" --no-sandbox

      - name: Assemble video with scroll
        run: |
          DURATION=$(ffprobe -i narration.wav -show_entries format=duration -v quiet -of csv="p=0" | cut -d. -f1)
          HEIGHT=$(python3 -c "from PIL import Image; print(Image.open('screenshot.png').size[1])")
          SCROLL=$(echo "scale=2; ($HEIGHT - 1920) / $DURATION" | bc)
          ffmpeg \
            -loop 1 -i screenshot.png \
            -i narration.wav \
            -filter_complex "[0:v]scale=1080:${HEIGHT},crop=1080:1920:0:'min(t*${SCROLL}\,${HEIGHT}-1920)',subtitles=subs.srt:force_style='FontSize=20,PrimaryColour=&H00ffffff&,OutlineColour=&H00000000&,Outline=2,Shadow=1'[v]" \
            -map "[v]" -map "1:a" \
            -c:v libx264 -preset fast -crf 23 \
            -c:a aac -shortest \
            output.mp4

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: horror-video
          path: output.mp4
