name: Horror Video Pipeline

on:
  workflow_dispatch:
    inputs:
      reddit_url:
        description: 'URL Reddit'
        required: true
      audio_url:
        description: 'URL WAV'
        required: true

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg nodejs npm python3-pip
          pip3 install stable-ts --break-system-packages
          npm install -g puppeteer-cli

      - name: Download audio
        run: wget -O narration.wav "${{ github.event.inputs.audio_url }}"

      - name: Read narration
        run: cat narration.txt

      - name: Generate SRT subtitles
        run: |
          stable-ts narration.wav --output subs.srt

     - name: Download background music
        run: |
          wget -O music.mp3 "https://upload.wikimedia.org/wikipedia/commons/b/bd/Ravel_-_Gaspard_de_la_nuit_-_1._Ondine.ogg" || echo "No music, continuing"
          ffmpeg -i music.mp3 music_conv.mp3 2>/dev/null || cp narration.wav music_conv.mp3

      - name: Screenshot Reddit
        run: |
          puppeteer screenshot \
            --url "${{ github.event.inputs.reddit_url }}" \
            --full-page \
            --output screenshot.png \
            --viewport-width 1080

      - name: Assemble video
        run: |
          ffmpeg \
            -loop 1 -i screenshot.png \
            -i narration.wav \
            -stream_loop -1 -i music.mp3 \
            -filter_complex "\
              [0:v]scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black,subtitles=subs.srt:force_style='FontSize=18,PrimaryColour=&Hffffff&'[v];\
              [1:a]volume=1.0[narr];\
              [2:a]volume=0.15[music];\
              [narr][music]amix=inputs=2:duration=first[a]" \
            -map
