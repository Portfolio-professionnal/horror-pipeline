name: Horror Video Pipeline

on:
  workflow_dispatch:
    inputs:
      reddit_url:
        description: 'URL Reddit'
        required: true
      audio_url:
        description: 'URL WAV'
        required: true

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip bc
          pip3 install stable-ts Pillow playwright --break-system-packages
          playwright install chromium --with-deps

      - name: Download audio
        run: wget -O narration.wav "${{ github.event.inputs.audio_url }}"

      - name: Generate subtitles
        run: stable-ts narration.wav --output subs.ass --word_level True

      - name: Style subtitles
        run: |
          python3 << 'EOF'
          content = open('subs.ass', 'r').read()
          # Blanc pour le texte normal, violet pour le mot actif
          content = content.replace('SecondaryColour: &H00000000', 'SecondaryColour: &H00FF00FF')
          open('subs.ass', 'w').write(content)
          print('Subtitles styled')
          EOF

      - name: Generate Reddit HTML
        run: |
          python3 << 'EOF'
          import json
          d = json.load(open('post.json'))
          title = d['title'].replace('<','&lt;').replace('>','&gt;')
          text = d['text'].replace('<','&lt;').replace('>','&gt;').replace('\n\n','</p><p>').replace('\n','<br>')
          author = d['author']
          score = d['score']
          html = f"""<!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <style>
            * {{ margin: 0; padding: 0; box-sizing: border-box; }}
            body {{
              background: #1a1a1b;
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              width: 1080px;
            }}
            .header {{
              background: #1a1a1b;
              border-bottom: 2px solid #ff4500;
              padding: 20px 30px;
            }}
            .header-logo {{
              color: #ff4500;
              font-size: 42px;
              font-weight: 900;
            }}
            .post {{
              background: #272729;
              margin: 20px;
              border-radius: 8px;
              border: 1px solid #343536;
            }}
            .post-meta {{
              padding: 20px 30px 10px;
              display: flex;
              align-items: center;
              gap: 10px;
              flex-wrap: wrap;
            }}
            .subreddit {{ color: #ff4500; font-weight: 700; font-size: 24px; }}
            .dot {{ color: #818384; font-size: 20px; }}
            .author {{ color: #818384; font-size: 22px; }}
            .author span {{ color: #4fbdff; }}
            .score {{
              background: #ff4500;
              color: white;
              font-size: 20px;
              font-weight: 700;
              padding: 4px 12px;
              border-radius: 20px;
            }}
            .post-title {{
              color: #d7dadc;
              font-size: 38px;
              font-weight: 700;
              line-height: 1.4;
              padding: 10px 30px 20px;
              border-bottom: 1px solid #343536;
            }}
            .post-body {{
              color: #d7dadc;
              font-size: 28px;
              line-height: 2.0;
              padding: 30px;
            }}
            .post-body p {{ margin-bottom: 24px; }}
            .post-footer {{
              padding: 16px 30px;
              border-top: 1px solid #343536;
              display: flex;
              gap: 20px;
            }}
            .footer-btn {{ color: #818384; font-size: 20px; font-weight: 700; }}
          </style>
          </head>
          <body>
            <div class="header">
              <div class="header-logo">reddit</div>
            </div>
            <div class="post">
              <div class="post-meta">
                <span class="subreddit">r/nosleep</span>
                <span class="dot">•</span>
                <span class="author">Posted by <span>u/{author}</span></span>
                <span class="score">▲ {score}</span>
              </div>
              <div class="post-title">{title}</div>
              <div class="post-body"><p>{text}</p></div>
              <div class="post-footer">
                <span class="footer-btn">💬 Comments</span>
                <span class="footer-btn">⬆ Share</span>
                <span class="footer-btn">⭐ Save</span>
              </div>
            </div>
          </body>
          </html>"""
          open('thread.html', 'w').write(html)
          print('HTML generated')
          EOF

      - name: Screenshot HTML
        run: |
          python3 << 'EOF'
          from playwright.sync_api import sync_playwright
          import os
          with sync_playwright() as p:
              browser = p.chromium.launch(args=['--no-sandbox'])
              context = browser.new_context(viewport={'width': 1080, 'height': 1920})
              page = context.new_page()
              page.goto(f"file://{os.getcwd()}/thread.html", wait_until='load')
              page.screenshot(path='screenshot.png', full_page=True)
              browser.close()
          print('Screenshot done')
          EOF

      - name: Assemble video with scroll
        run: |
          DURATION=$(ffprobe -i narration.wav -show_entries format=duration -v quiet -of csv="p=0" | cut -d. -f1)
          HEIGHT=$(python3 -c "from PIL import Image; print(Image.open('screenshot.png').size[1])")
          SCROLL=$(echo "scale=2; ($HEIGHT - 1920) / $DURATION" | bc)
          ffmpeg \
            -loop 1 -i screenshot.png \
            -i narration.wav \
            -filter_complex "[0:v]scale=1080:${HEIGHT},crop=1080:1920:0:'min(t*${SCROLL}\,${HEIGHT}-1920)',ass=subs.ass[v]" \
            -map "[v]" -map "1:a" \
            -c:v libx264 -preset fast -crf 23 \
            -c:a aac -shortest \
            output.mp4

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: horror-video
          path: output.mp4
