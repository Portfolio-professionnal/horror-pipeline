name: Horror Video Pipeline

on:
  workflow_dispatch:
    inputs:
      reddit_url:
        description: 'URL Reddit'
        required: true
      audio_url:
        description: 'URL WAV'
        required: true

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install stable-ts --break-system-packages
          npm install -g puppeteer-cli

      - name: Download audio
        run: wget -O narration.wav "${{ github.event.inputs.audio_url }}"

      - name: Generate SRT subtitles
        run: stable-ts narration.wav --output subs.srt

      - name: Screenshot Reddit
        run: |
          OLD_URL=$(echo "${{ github.event.inputs.reddit_url }}" | sed 's/www.reddit.com/old.reddit.com/g')
          puppeteer screenshot "$OLD_URL" screenshot.png --full-page --viewport "1080x1920" --no-sandbox

      - name: Assemble video
        run: |
          ffmpeg \
            -loop 1 -i screenshot.png \
            -i narration.wav \
            -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black,subtitles=subs.srt:force_style='FontSize=18,PrimaryColour=&Hffffff&'" \
            -c:v libx264 -preset fast -crf 23 \
            -c:a aac -shortest \
            output.mp4

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: horror-video
          path: output.mp4
