name: Horror Video Pipeline

on:
  workflow_dispatch:
    inputs:
      reddit_url:
        description: 'URL Reddit'
        required: true
      audio_url:
        description: 'URL WAV'
        required: true

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip bc
          pip3 install stable-ts Pillow --break-system-packages
          npm install -g puppeteer-cli
          node -e "require('puppeteer')" 2>/dev/null || npm install puppeteer

      - name: Download audio
        run: wget -O narration.wav "${{ github.event.inputs.audio_url }}"

      - name: Generate SRT subtitles
        run: stable-ts narration.wav --output subs.srt

      - name: Screenshot Reddit
        run: |
          cat > screenshot.js << 'EOF'
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox', '--disable-setuid-sandbox'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1080, height: 1920 });
            await page.setCookie({
              name: 'token_v2',
              value: process.env.REDDIT_COOKIE,
              domain: '.reddit.com'
            });
            await page.goto(process.env.REDDIT_URL, { waitUntil: 'networkidle2', timeout: 60000 });
            await page.screenshot({ path: 'screenshot.png', fullPage: true });
            await browser.close();
          })();
          EOF
          REDDIT_COOKIE="${{ secrets.REDDIT_COOKIE }}" REDDIT_URL="${{ github.event.inputs.reddit_url }}" node screenshot.js

      - name: Assemble video with scroll
        run: |
          DURATION=$(ffprobe -i narration.wav -show_entries format=duration -v quiet -of csv="p=0" | cut -d. -f1)
          HEIGHT=$(python3 -c "from PIL import Image; print(Image.open('screenshot.png').size[1])")
          SCROLL=$(echo "scale=2; ($HEIGHT - 1920) / $DURATION" | bc)
          ffmpeg \
            -loop 1 -i screenshot.png \
            -i narration.wav \
            -filter_complex "[0:v]scale=1080:${HEIGHT},crop=1080:1920:0:'min(t*${SCROLL}\,${HEIGHT}-1920)',subtitles=subs.srt:force_style='FontSize=20,PrimaryColour=&H00ffffff&,OutlineColour=&H00000000&,Outline=2,Shadow=1'[v]" \
            -map "[v]" -map "1:a" \
            -c:v libx264 -preset fast -crf 23 \
            -c:a aac -shortest \
            output.mp4

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: horror-video
          path: output.mp4
