name: Horror Video Pipeline

on:
  workflow_dispatch:
    inputs:
      reddit_url:
        description: 'URL Reddit'
        required: true
      audio_url:
        description: 'URL WAV'
        required: true

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg nodejs npm
          npm install -g puppeteer-cli

      - name: Download audio
        run: |
          wget -O narration.wav "${{ github.event.inputs.audio_url }}"

      - name: Read narration text
        run: |
          wget -O narration.txt "https://raw.githubusercontent.com/Portfolio-professionnal/horror-pipeline/main/narration.txt"

      - name: Screenshot Reddit
        run: |
          puppeteer screenshot \
            --url "${{ github.event.inputs.reddit_url }}" \
            --full-page \
            --output screenshot.png \
            --viewport-width 1080

      - name: Assemble video
        run: |
          ffmpeg \
            -loop 1 -i screenshot.png \
            -i narration.wav \
            -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black" \
            -c:v libx264 -preset fast -crf 23 \
